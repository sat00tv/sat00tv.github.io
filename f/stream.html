<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lecture de flux vidéo HTTP avec Video.js</title>
  <!-- Inclure les styles CSS de Video.js -->
  <link href="https://vjs.zencdn.net/7.16.0/video-js.css" rel="stylesheet">
</head>
<body>

  <video id="my-video" class="video-js" controls preload="auto" width="640" height="264" data-setup='{}'>
    <!-- Source du flux vidéo -->
    <source src="http://connectiktv.ddns.net:5000/mytvchannel/@mytvchannel/playlist.m3u8" type="application/x-mpegURL">
    <!-- Fallback pour les navigateurs ne prenant pas en charge le HTML5 video -->
    <p class="vjs-no-js">
      Pour regarder cette vidéo, veuillez activer JavaScript et envisager de passer à un navigateur web qui prend en charge les vidéos HTML5.
      <a href="https://videojs.com/html5-video-support/" target="_blank">Support HTML5</a>
    </p>
  </video>

  <!-- Inclure la bibliothèque JavaScript de Video.js -->

</body>
</html>
