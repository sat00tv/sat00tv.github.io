





<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video.js HLS Streaming</title>
    <!-- Inclure la bibliothèque principale de Video.js -->
    <link href="https://vjs.zencdn.net/7.16.0/video-js.css" rel="stylesheet">
    <script src="https://vjs.zencdn.net/7.16.0/video.min.js"></script>
    <!-- Inclure le plugin pour la lecture HLS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/videojs-contrib-hls/5.16.0/videojs-contrib-hls.min.js"></script>
</head>
<body>
    <!-- Balise vidéo pour afficher le lecteur Video.js -->
    <video id="my-video" class="video-js" controls preload="auto" width="640" height="360">
        <!-- Source de la vidéo -->
        <source src="http://connectiktv.ddns.net:5000/mytvchannel/@mytvchannel/chunklist_w651579700.m3u8" type="application/x-mpegURL">
    </video>

    <!-- Script pour initialiser le lecteur Video.js -->
    <script>
        // Initialiser le lecteur Video.js
        var player = videojs('my-video');

        // Ajouter le plugin pour la lecture HLS
        player.ready(function() {
            var options = {};
            player.hls(options);
        });
    </script>
</body>
</html>
